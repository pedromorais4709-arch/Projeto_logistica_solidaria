{% extends 'base/base.html' %}
{% block title %}Avaliar Pedido{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'pedidos:detalhe' pedido.pk %}" class="text-gray-400 hover:text-gray-600">← Voltar</a>
    <h1 class="text-2xl font-bold">Avaliar Pedido #{{ pedido.pk }}</h1>
  </div>
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <form method="post" class="flex flex-col gap-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="bg-primary text-white px-6 py-2.5 rounded-lg font-medium text-sm hover:bg-primary-dark transition-colors">Enviar Avaliação</button>
    </form>
  </div>
</div>
{% endblock %}
