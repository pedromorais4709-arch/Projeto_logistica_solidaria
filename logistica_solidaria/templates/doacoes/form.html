{% extends 'base/base.html' %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'doacoes:lista' %}" class="text-gray-400 hover:text-gray-600">← Voltar</a>
    <h1 class="text-2xl font-bold">{{ titulo }}</h1>
  </div>
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <form method="post" enctype="multipart/form-data" class="flex flex-col gap-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <div class="flex gap-3 mt-2">
        <button type="submit" class="bg-primary text-white px-6 py-2.5 rounded-lg font-medium text-sm hover:bg-primary-dark transition-colors">Salvar</button>
        <a href="{% url 'doacoes:lista' %}" class="px-6 py-2.5 rounded-lg text-sm text-gray-500 border border-gray-200 hover:bg-gray-50 transition-colors">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
